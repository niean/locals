<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD文件渲染工具</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='12' fill='url(%23grad)'/%3E%3Cpath d='M30 25 L30 75 L70 75 L70 40 L55 40 L55 25 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M55 25 L70 40 L55 40 Z' fill='white' opacity='0.7'/%3E%3Cpath d='M35 45 L65 45 M35 55 L65 55 M35 65 L50 65' stroke='%23667eea' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <script src="lib/marked.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <link rel="stylesheet" href="lib/github.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }


        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            flex: 1;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .toggle-input-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .toggle-input-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }


        .output-section {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .markdown-content {
            flex: 1;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .output-header h2 {
            color: #495057;
            font-size: 1.5em;
            word-break: break-all;
        }

        .file-info {
            color: #6c757d;
            font-size: 14px;
        }

        .markdown-content {
            line-height: 1.8;
            color: #212529;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #212529;
        }

        .markdown-content h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        .markdown-content h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        .markdown-content h3 {
            font-size: 1.25em;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 0.25em;
        }

        .markdown-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin-bottom: 16px;
        }

        .markdown-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .markdown-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .markdown-content pre code {
            display: inline;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }

        .markdown-content table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }

        .markdown-content table th,
        .markdown-content table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        .markdown-content table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 16px 0;
        }

        .markdown-content a {
            color: #0366d6;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .output-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>📝 MD文件渲染工具</h1>
            </div>
            <button class="toggle-input-btn" id="openFileBtn" onclick="document.getElementById('fileInput').click()">
                📁 打开文件
            </button>
        </div>

        <input type="file" id="fileInput" accept=".md,.markdown,.txt" onchange="handleFileSelect(event)" style="display: none;">

        <div class="output-section">
            <div class="output-header">
                <h2 id="outputTitle">渲染结果</h2>
                <div class="file-info" id="fileInfo"></div>
            </div>
            <div id="errorContainer"></div>
            <div id="markdownOutput" class="markdown-content">
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <div class="empty-state-text">请点击右上角的"打开文件"按钮选择 Markdown 文件</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // 显示错误信息
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">❌ ${message}</div>`;
        }

        // 清除错误信息
        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }


        // 渲染 Markdown
        function renderMarkdown(content, fileName) {
            try {
                clearError();
                const html = marked.parse(content);
                document.getElementById('markdownOutput').innerHTML = html;
                
                // 更新文件信息
                if (fileName) {
                    document.getElementById('fileInfo').textContent = `文件：${fileName}`;
                    document.getElementById('outputTitle').textContent = fileName;
                } else {
                    document.getElementById('fileInfo').textContent = '';
                    document.getElementById('outputTitle').textContent = '渲染结果';
                }
                
            } catch (error) {
                showError('渲染 Markdown 时出错：' + error.message);
            }
        }

        // 读取文件内容
        function readFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                renderMarkdown(e.target.result, file.name);
            };
            reader.onerror = function() {
                showError('读取文件失败');
            };
            reader.readAsText(file, 'UTF-8');
        }

        // 文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                if (!file.name.match(/\.(md|markdown|txt)$/i)) {
                    showError('请选择 Markdown 文件（.md, .markdown, .txt）');
                    return;
                }
                readFile(file);
            }
        }


    </script>
</body>
</html>
